[build]
  # Set the base directory to the Next.js app so Netlify's Next.js plugin works correctly
  base = "package/example"
  
  # Build the workspace package first, then the Next.js app
  command = "pnpm --filter agentation build && pnpm run build"
  
  # Netlify usually auto-detects this for Next.js, but good to be explicit
  publish = ".next"

# Let Netlify handle Next.js perfectly
[[plugins]]
  package = "@netlify/plugin-nextjs"
